<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/jpeg" href="images1.jfif">
  <title>Login | SIAC</title>
  <meta name="description" content="Acesso institucional ao SIAC.">
  <link rel="stylesheet" href="styles.css">
</head>

<body class="login-body gov-login-page">
  <header class="gov-topbar">
    <div class="gov-topbar-inner">
      <img class="gov-mini-logo" src="logoSispern.png" alt="Brasão institucional">
      <p class="gov-title">Sistema Instrumental de Administração e Contratos - SIAC</p>
    </div>
  </header>

  <main class="gov-main gov-main-login-modern">
    <div class="login-wrap">
      <div class="login-html">
        <div class="login-form">
          <form id="login-form" class="auth-form" novalidate>
            <img class="login-slogan-image" src="logoSispern.png" alt="Símbolo institucional">
            <p class="login-card-title">Insira seus dados para acessar o sistema</p>
            <p id="login-error" class="login-error" hidden></p>

            <div class="group">
              <label for="usuario" class="label">Usuário/E-mail</label>
              <input id="usuario" name="usuario" type="text" class="input" required placeholder="CPF ou E-mail" autocomplete="username">
            </div>

            <div class="group">
              <label for="senha" class="label">Senha</label>
              <input id="senha" name="senha" type="password" class="input" data-type="password" required placeholder="Senha" autocomplete="current-password">
            </div>

            <div class="group">
              <button type="submit" class="button">Entrar</button>
            </div>

            <div class="hr"></div>
            <div class="login-links">
              <a href="solicitar-acesso.html">Solicitar Acesso</a>
              <span aria-hidden="true">|</span>
              <a href="esqueci-senha.html">Esqueci minha senha</a>
            </div>
            <div class="foot-lnk login-credit">Sistema desenvolvido pela <strong>SEAP/UIAG</strong>.</div>
          </form>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="backend-config.js"></script>
  <script src="backend-api.js"></script>
  <script src="auth-db.js"></script>
  <script src="login.js"></script>
</body>

</html>
