<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/jpeg" href="images1.jfif">
  <title>Login | SIAC</title>
  <meta name="description" content="Acesso institucional ao SIAC.">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="login-body gov-login-page">
  <header class="gov-topbar">
    <div class="gov-topbar-inner">
      <img class="gov-mini-logo" src="policia-penal-rn.png" alt="Bras&atilde;o institucional">
      <p class="gov-title">Sistema Instrumental de Administra&ccedil;&atilde;o e Contratos - SIAC</p>
    </div>
  </header>
  <main class="gov-main gov-main-login-modern">
    <div class="login-wrap">
      <div class="login-html">
        <div class="login-form">
          <form id="login-form" class="auth-form" novalidate>
            <img class="login-slogan-image" src="policia-penal-rn.png" alt="S&iacute;mbolo institucional">
            <p class="login-card-title">Insira seus dados para acessar o sistema</p>
            <p id="login-error" class="login-error" hidden></p>
            <div class="group">
              <label for="usuario" class="label">Usu&aacute;rio/E-mail</label>
              <input id="usuario" name="usuario" type="text" class="input" required placeholder="CPF ou E-mail" autocomplete="username">
            </div>
            <div class="group">
              <label for="senha" class="label">Senha</label>
              <div class="password-field">
                <input id="senha" name="senha" type="password" class="input" data-type="password" required placeholder="Senha" autocomplete="current-password">
                <button type="button" class="password-toggle" id="toggle-password" aria-label="Mostrar senha" aria-pressed="false">Mostrar</button>
              </div>
            </div>
            <div class="group">
              <button type="submit" class="button">Entrar</button>
            </div>
            <div class="hr"></div>
            <div class="login-links">
              <a href="solicitar-acesso.html">Solicitar Acesso</a>
              <span aria-hidden="true">|</span>
              <a href="esqueci-senha.html">Esqueci minha senha</a>
            </div>
            <div class="foot-lnk login-credit"><span class="login-version">Vers&atilde;o Beta 1.0.1</span></div>
          </form>
        </div>
      </div>
    </div>
  </main>
  <footer class="login-footer">
    <p>&copy; 2026 Secretaria de Administra&ccedil;&atilde;o Penitenci&aacute;ria &ndash; SEAP/RN</p>
    <p>Desenvolvimento por Equipe de Contrata&ccedil;&atilde;o - UIAG</p>
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="backend-config.js"></script>
  <script src="backend-api.js"></script>
  <script src="auth-db.js"></script>
  <script src="login.js"></script>
</body>
</html>
